# R-Pingmesh Agent Configuration

# Agent identification
agent_id: ""        # Required: unique agent identifier (defaults to hostname)
hostname: ""        # Auto-detected if empty
tor_id: ""          # Required: Top-of-Rack switch identifier

# Controller connection
controller_addr: "localhost:50051"

# Probing settings
probe_interval_ms: 500           # Probe interval in milliseconds
# Per-target probe-rate caps (probes/sec PER TARGET; a target's ECMP flow labels
# share this budget, they do not multiply it). R-Pingmesh probes the ToR-mesh
# more aggressively than inter-ToR, so the two pinglist types have separate caps.
# target_probe_rate_per_second is the legacy uniform cap: it is used as the
# fallback for whichever per-type cap below is left at 0, so an existing config
# that only sets it keeps a single uniform rate.
target_probe_rate_per_second: 10   # Fallback cap for any per-type rate left at 0
tor_mesh_probe_rate_per_second: 10 # ToR-mesh targets (0 = inherit target_probe_rate_per_second)
inter_tor_probe_rate_per_second: 1 # Inter-ToR targets (0 = inherit target_probe_rate_per_second)
pinglist_update_interval_sec: 300 # Pinglist refresh interval

# ECMP flow-label rotation
# Period over which the rotating ~20% of each target's flow-label set is
# refreshed, shifting a fraction of probed ECMP paths over time while the rest
# stay stable for time-series continuity. The label COUNT is sized by the
# controller (see controller.yaml ecmp_* settings).
flow_label_rotation_period_sec: 3600

# Analyzer reporting (Phase 1)
# When enabled, the agent aggregates probe results per path over fixed windows
# and reports PathSummary batches to the controller's analyzer via
# ReportProbeAnalysis. Reporting is best-effort and never blocks probing.
analysis_report_enabled: true
analysis_window_sec: 30          # per-path aggregation window length

# RDMA settings
gid_index: 0                     # GID table index to use
allowed_device_names: []         # Empty = all devices

# Telemetry
metrics_enabled: true
otel_collector_addr: "localhost:4317"

# Self-protection (opt-in)
# When enabled, a watchdog samples this process's CPU/memory every
# watchdog_interval_sec and, on threshold breach, steps the probe send rate down
# (fail-slow: 1.0 -> 0.5 -> 0.25 -> 0.1, never 0) to shed load, restoring it as
# usage recovers. It never stops probing (no monitoring blind spot). The current
# multiplier is exported as the rpingmesh.agent.self_throttle gauge.
self_protection_enabled: false   # opt-in; default keeps prior behavior
watchdog_interval_sec: 5         # resource sampling period
# Hard runtime caps (applied whenever > 0, independent of self_protection_enabled):
max_memory_mb: 0                 # GOMEMLIMIT via debug.SetMemoryLimit (0 = disabled)
max_procs: 0                     # cap GOMAXPROCS (0 = Go default: all cores)
# Throttle thresholds (used only when self_protection_enabled):
throttle_memory_ratio: 0.9       # engage at 90% of max_memory_mb (only if max_memory_mb > 0)
throttle_cpu_percent: 90         # engage at 90% of available CPU capacity (GOMAXPROCS cores)

# Logging
log_level: "info"                # debug, info, warn, error
