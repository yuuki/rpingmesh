syntax = "proto3";

package controller_agent;

option go_package = "github.com/yuuki/rpingmesh/rebuild/proto/controller_agent";

// ControllerService provides agent registration and pinglist distribution.
// This is the simplified rebuild version without GetTargetRnicInfo (eBPF out of scope).
service ControllerService {
    // RegisterAgent registers an agent and its RNICs with the controller.
    rpc RegisterAgent(AgentRegistrationRequest) returns (AgentRegistrationResponse);
    // GetPinglist returns the list of targets for an agent to probe.
    rpc GetPinglist(PinglistRequest) returns (PinglistResponse);
    // ReportProbeAnalysis reports per-path, window-aggregated probe summaries
    // from an agent so the controller-side analyzer can detect SLA violations
    // (and, in a future phase, localize switch/link faults across agents).
    rpc ReportProbeAnalysis(ProbeAnalysisReport) returns (ProbeAnalysisAck);
}

// RnicInfo describes an RDMA NIC.
message RnicInfo {
    string gid = 1;
    uint32 qpn = 2;
    string ip_address = 3;
    string host_name = 4;
    string tor_id = 5;
    string device_name = 6;
}

// AgentRegistrationRequest is sent by agents to register with the controller.
message AgentRegistrationRequest {
    string agent_id = 1;
    string agent_ip = 2;
    string hostname = 3;
    string tor_id = 4;
    repeated RnicInfo rnics = 5;
}

// AgentRegistrationResponse is returned after agent registration.
message AgentRegistrationResponse {
    bool success = 1;
    string message = 2;
}

// PinglistType determines what kind of pinglist to generate.
enum PinglistType {
    TOR_MESH = 0;     // All RNICs within the same ToR
    INTER_TOR = 1;    // Sample RNICs from other ToRs
}

// PinglistRequest asks for a set of probe targets.
message PinglistRequest {
    string agent_id = 1;
    string tor_id = 2;
    string requester_gid = 3;
    PinglistType type = 4;
}

// PingTarget describes a single probe target.
message PingTarget {
    string target_gid = 1;
    uint32 target_qpn = 2;
    string target_ip = 3;
    string target_hostname = 4;
    string target_tor_id = 5;
    string target_device_name = 6;
    // source_port is metadata only (not enforced at the RDMA layer).
    uint32 source_port = 7;
    // flow_label is the base (legacy) ECMP flow label applied via
    // ibv_ah_attr.grh.flow_label. It remains populated for backward
    // compatibility and is the sole label the agent uses when
    // flow_label_count <= 1.
    uint32 flow_label = 8;
    uint32 priority = 9;
    // flow_label_count is the number of distinct ECMP flow labels the agent
    // rotates through when probing this target. The controller sizes it via
    // R-Pingmesh Eq.(1) (coupon-collector coverage) so the target's ECMP paths
    // are covered with a configured probability. 0 or 1 selects legacy
    // single-label behavior (use flow_label as-is).
    uint32 flow_label_count = 10;
    // flow_label_seed deterministically seeds agent-side generation of the
    // flow-label set, so the controller need not enumerate every label in the
    // message (seed + count is far smaller than a repeated list). The agent
    // derives label i from a hash of (seed, i, rotation_epoch).
    fixed32 flow_label_seed = 11;
}

// PinglistResponse contains the list of targets to probe.
message PinglistResponse {
    repeated PingTarget targets = 1;
    PinglistType type = 2;
}

// PathSummary is a window-aggregated summary of one probe path
// (source RNIC -> target RNIC), produced by the agent-side PathAggregator.
// Reporting summaries instead of raw per-probe results cuts the controller's
// ingest volume by roughly three orders of magnitude (see analyzer design).
//
// RTT statistics are summary statistics only (min/max plus p50/p99 estimated
// from fixed histogram buckets); no full histogram is carried, to keep the
// message small. All RTT fields are network RTT in nanoseconds.
message PathSummary {
    string source_gid           = 1;   // source RNIC GID (this agent)
    string source_tor_id        = 2;   // source RNIC ToR (this agent)
    string target_gid           = 3;   // target RNIC GID
    string target_tor_id        = 4;   // target RNIC ToR
    uint32 target_qpn           = 5;
    uint64 window_start_unix_ns = 6;   // wall-clock start of the aggregation window
    uint32 window_duration_ms   = 7;
    uint32 probe_total          = 8;   // = probe_success + probe_failed + invalid_rtt_count
    uint32 probe_success        = 9;   // completed with a valid RTT (feeds the RTT stats)
    uint32 probe_failed         = 10;  // send failure or ACK timeout (counts as loss)
    uint64 network_rtt_min_ns   = 11;
    uint64 network_rtt_max_ns   = 12;
    uint64 network_rtt_p50_ns   = 13;
    uint64 network_rtt_p99_ns   = 14;
    // invalid_rtt_count: probes that completed all 6 timestamps (Success) but
    // whose RTT failed validation (e.g. clock-skew/SW-timestamp noise). Not
    // counted as loss.
    uint32 invalid_rtt_count    = 15;
}

// ProbeAnalysisReport is a batch of window summaries reported by one agent.
message ProbeAnalysisReport {
    string agent_id = 1;
    repeated PathSummary summaries = 2;
}

// ProbeAnalysisAck acknowledges a ProbeAnalysisReport.
message ProbeAnalysisAck {
    bool accepted = 1;
    // sla_violations is the number of summaries in the acked report that the
    // controller-side analyzer flagged as SLA violations (loss and/or p99 RTT
    // threshold breaches). It gives the reporting agent operational feedback
    // and makes the ingest+detection path observable end-to-end without an
    // OTLP collector. 0 when the analyzer is disabled.
    uint32 sla_violations = 2;
}
